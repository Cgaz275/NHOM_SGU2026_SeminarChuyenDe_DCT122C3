version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_movie_bot
    restart: always
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
      - TZ=Asia/Ho_Chi_Minh
      - N8N_SECURE_COOKIE=false
    volumes:
      - ./n8n_data:/home/node/.n8n
    # Dòng lệnh dưới đây cực quan trọng để Telegram gọi được bot của bạn từ bên ngoài
    # Nó tạo một đường hầm (tunnel) tạm thời ra internet
    command: "start --tunnel"